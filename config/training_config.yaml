project:
  name: BrainVision AI
  repository: BrainVisionAI
  model_version: 1.0.0
  seed: 42
dataset:
  expected_root: data/brain-tumor-mri-dataset
  training_dir: Training
  testing_dir: Testing
  classes:
  - glioma
  - meningioma
  - notumor
  - pituitary
  display_names:
    glioma: Glioma
    meningioma: Meningioma
    notumor: No Tumor
    pituitary: Pituitary
training:
  image_size:
  - 224
  - 224
  batch_size: 32
  validation_split: 0.15
  head_epochs: 12
  fine_tune_epochs: 18
  head_learning_rate: 0.001
  fine_tune_learning_rate: 2.0e-05
  dropout: 0.35
  dense_units: 256
  fine_tune_from_layer: 180
  label_smoothing: 0.05
outputs:
  best_model: model/brainvision_efficientnetb0.keras
  final_model: model/brainvision_efficientnetb0_final.keras
  labels: model/labels.json
  metrics: artifacts/test_metrics.json
  classification_report: artifacts/classification_report.csv
  history: artifacts/training_history.csv
  confusion_matrix: artifacts/confusion_matrix.csv
  run_metadata: artifacts/run_metadata.json
